[phases.setup]
nixPkgs = ["python3", "python3.pkgs.pip", "gcc", "libffi", "openssl"]

[phases.install]
commands = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "python manage.py migrate --noinput && gunicorn exam_system.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile -"